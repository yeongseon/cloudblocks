name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Lint all packages
        run: pnpm lint

  web-build:
    name: Web Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Scan build output for leaked secrets
        run: ./scripts/check-build-secrets.sh apps/web/dist

      - name: Check bundle size budget
        run: |
          MAX_TOTAL_KB=800
          MAX_ENTRY_KB=350
          DIST_DIR="apps/web/dist/assets"

          TOTAL_KB=$(du -sk "$DIST_DIR" | cut -f1)
          echo "Total assets: ${TOTAL_KB} KB (budget: ${MAX_TOTAL_KB} KB)"

          LARGEST_JS=$(find "$DIST_DIR" -name '*.js' -exec du -k {} + | sort -rn | head -1)
          LARGEST_KB=$(echo "$LARGEST_JS" | cut -f1)
          LARGEST_FILE=$(echo "$LARGEST_JS" | cut -f2)
          echo "Largest JS chunk: ${LARGEST_KB} KB — $(basename "$LARGEST_FILE") (budget: ${MAX_ENTRY_KB} KB)"

          FAIL=0
          if [ "$TOTAL_KB" -gt "$MAX_TOTAL_KB" ]; then
            echo "::error::Bundle size ${TOTAL_KB} KB exceeds budget of ${MAX_TOTAL_KB} KB"
            FAIL=1
          fi
          if [ "$LARGEST_KB" -gt "$MAX_ENTRY_KB" ]; then
            echo "::error::Entry chunk $(basename "$LARGEST_FILE") is ${LARGEST_KB} KB, exceeds ${MAX_ENTRY_KB} KB budget"
            FAIL=1
          fi

          echo ""
          echo "=== Bundle Size Report ==="
          find "$DIST_DIR" -name '*.js' -exec du -k {} + | sort -rn | while read -r size file; do
            echo "  ${size} KB — $(basename "$file")"
          done
          echo "========================="

          exit $FAIL

  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: apps/web

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: false

  package-tests:
    name: Package Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Test @cloudblocks/schema
        run: pnpm --filter @cloudblocks/schema test

      - name: Test @cloudblocks/domain
        run: pnpm --filter @cloudblocks/domain test

  api-lint:
    name: API Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api

      - name: Ruff check
        run: python -m ruff check app/
        working-directory: apps/api

  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api

      - name: Run tests with coverage
        run: python -m pytest app/tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: apps/api

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection ───────────────────────────────────────────
  # On PRs, detect which paths changed so downstream jobs can skip.
  # On push-to-main, everything runs (outputs default to 'true').
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'tsconfig.json'
            api:
              - 'apps/api/**'
            packages:
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'tsconfig.json'
            ci:
              - '.github/workflows/**'
              - 'pnpm-lock.yaml'
              - 'package.json'

      # On push-to-main, all outputs default to empty string.
      # Jobs treat empty as 'true' via: needs.changes.outputs.X != 'false'

  # ─── Banned Terms Check ───────────────────────────────────────
  banned-terms:
    name: Check for Banned Terms
    needs: changes
    if: needs.changes.outputs.web != 'false' || needs.changes.outputs.packages != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for banned terminology
        run: |
          FOUND=0

          # Search in TypeScript/JavaScript source files, CSS, and docs (excluding exempt patterns)
          grep -rniE '\b(plate|brick|lego|stud|stub)\b' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            --include='*.css' --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.py' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=coverage \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            apps/ packages/ docs/ \
            | grep -viE '(student|Student|vi\.stubEnv|vi\.stubGlobal|vi\.unstubAllGlobals|stubAudioContext)' \
            | grep -viE '(BRICK_DESIGN_SPEC|VISUAL_DESIGN_SPEC|BRICK_GUIDEBOOK)' \
            | grep -viE '(Historical|Superseded|docs/adr/)' \
            && FOUND=1

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Banned terminology found in source files. See output above."
            exit 1
          fi

          echo "✅ No banned terms found."

  # ─── Web ─────────────────────────────────────────────────────────
  web-lint:
    name: Web Lint
    needs: changes
    if: needs.changes.outputs.web != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Lint all packages
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  web-build:
    name: Web Type Check & Build
    needs: changes
    if: needs.changes.outputs.web != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Scan build output for leaked secrets
        run: ./scripts/check-build-secrets.sh apps/web/dist

      - name: Check bundle size budget
        run: |
          MAX_TOTAL_KB=850
          MAX_ENTRY_KB=350
          DIST_DIR="apps/web/dist/assets"

          TOTAL_KB=$(du -sk "$DIST_DIR" | cut -f1)
          echo "Total assets: ${TOTAL_KB} KB (budget: ${MAX_TOTAL_KB} KB)"

          LARGEST_JS=$(find "$DIST_DIR" -name '*.js' -exec du -k {} + | sort -rn | head -1)
          LARGEST_KB=$(echo "$LARGEST_JS" | cut -f1)
          LARGEST_FILE=$(echo "$LARGEST_JS" | cut -f2)
          echo "Largest JS chunk: ${LARGEST_KB} KB — $(basename "$LARGEST_FILE") (budget: ${MAX_ENTRY_KB} KB)"

          FAIL=0
          if [ "$TOTAL_KB" -gt "$MAX_TOTAL_KB" ]; then
            echo "::error::Bundle size ${TOTAL_KB} KB exceeds budget of ${MAX_TOTAL_KB} KB"
            FAIL=1
          fi
          if [ "$LARGEST_KB" -gt "$MAX_ENTRY_KB" ]; then
            echo "::error::Entry chunk $(basename "$LARGEST_FILE") is ${LARGEST_KB} KB, exceeds ${MAX_ENTRY_KB} KB budget"
            FAIL=1
          fi

          echo ""
          echo "=== Bundle Size Report ==="
          find "$DIST_DIR" -name '*.js' -exec du -k {} + | sort -rn | while read -r size file; do
            echo "  ${size} KB — $(basename "$file")"
          done
          echo "========================="

          exit $FAIL

  web-test:
    name: Web Tests
    needs: changes
    if: needs.changes.outputs.web != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: apps/web

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: false

  package-tests:
    name: Package Tests
    needs: changes
    if: needs.changes.outputs.packages != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build:packages

      - name: Test @cloudblocks/schema
        run: pnpm --filter @cloudblocks/schema test

      - name: Test @cloudblocks/domain
        run: pnpm --filter @cloudblocks/domain test

  # ─── API ─────────────────────────────────────────────────────────
  api-lint:
    name: API Lint
    needs: changes
    if: needs.changes.outputs.api != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api

      - name: Ruff check
        run: python -m ruff check app/
        working-directory: apps/api

  api-test:
    name: API Tests
    needs: changes
    if: needs.changes.outputs.api != 'false' || needs.changes.outputs.ci != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api

      - name: Run tests with coverage
        run: python -m pytest app/tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: apps/api

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false

  # ─── Required Checks Gate ───────────────────────────────────────
  # Single gate job that branch protection requires.
  # Succeeds if all needed jobs pass OR were correctly skipped.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [web-lint, web-build, web-test, package-tests, api-lint, api-test, banned-terms]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        env:
          WEB_LINT: ${{ needs.web-lint.result }}
          WEB_BUILD: ${{ needs.web-build.result }}
          WEB_TEST: ${{ needs.web-test.result }}
          PKG_TESTS: ${{ needs.package-tests.result }}
          API_LINT: ${{ needs.api-lint.result }}
          API_TEST: ${{ needs.api-test.result }}
          BANNED_TERMS: ${{ needs.banned-terms.result }}
        run: |
          echo "=== CI Gate Check ==="
          FAILED=0
          for pair in "web-lint:$WEB_LINT" "web-build:$WEB_BUILD" "web-test:$WEB_TEST" \
                      "package-tests:$PKG_TESTS" "api-lint:$API_LINT" "api-test:$API_TEST" \
                      "banned-terms:$BANNED_TERMS"; do
            job="${pair%%:*}"
            result="${pair#*:}"
            echo "$job: $result"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Job $job failed with result: $result"
              FAILED=1
            fi
          done
          exit $FAILED

# Deploy frontend demo + documentation site to GitHub Pages
#
# Triggers on push to main or manual dispatch.
# Builds:
#   1. Vite SPA → /cloudblocks/ (root)
#   2. MkDocs Material docs → /cloudblocks/docs/ (subpath)
#
# Prerequisites:
#   1. Enable GitHub Pages in repo Settings → Pages → Source: "GitHub Actions"
#   2. No additional secrets required — uses built-in GITHUB_TOKEN

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── SPA Build ──────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: npx vite build --base /cloudblocks/
        working-directory: apps/web

      - name: Scan build output for leaked secrets
        run: ./scripts/check-build-secrets.sh apps/web/dist

      # ── Docs Build ─────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: python -m mkdocs build --strict

      # ── Merge & Upload ─────────────────────────────────────────
      - name: Merge SPA and docs into single artifact
        run: |
          cp -r site/ apps/web/dist/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

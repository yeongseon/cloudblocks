version: "3.8"

services:
  # ─── CUBRID Database ────────────────────────────────────────
  cubrid:
    image: cubrid/cubrid:11.2
    container_name: cloudblocks-cubrid
    ports:
      - "33000:33000"
      - "8001:8001"   # CUBRID Manager
    environment:
      CUBRID_DB: cloudblocks
    volumes:
      - cubrid-data:/var/lib/cubrid
    healthcheck:
      test: ["CMD", "csql", "-u", "dba", "cloudblocks", "-c", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache / Session / Queue) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudblocks-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible Object Storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: cloudblocks-minio
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cubrid-data:
  redis-data:
  minio-data:

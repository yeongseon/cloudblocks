site_name: CloudBlocks Documentation
site_description: Preset-driven visual cloud architecture design tool — start from templates, customize with blocks, preview across Azure, AWS, and GCP
site_url: https://yeongseon.github.io/cloudblocks/docs/
repo_url: https://github.com/yeongseon/cloudblocks
repo_name: yeongseon/cloudblocks
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

validation:
  links:
    not_found: info

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - header.autohide
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

extra_css:
  - stylesheets/professional-theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

exclude_docs: |
  adr/
  concept/ARCHITECTURE.md
  concept/PRD.md
  concept/PRODUCT_DIRECTION_SPEC.md
  concept/RESOURCE_CATEGORY_STRATEGY.md
  concept/ROADMAP.md
  design/CONNECTION_SPEC.md
  design/BRICK_DESIGN_SPEC.md
  design/BRICK_GUIDEBOOK.md
  design/GRAPH_IR_SPEC.md
  design/MODULE_BOUNDARIES.md
  design/NFR_TARGETS.md
  design/PROVIDER_RESOURCES.md
  design/RELEASE_GATES.md
  design/SECURITY_BOUNDARIES.md
  design/VERSION_POLICY.md
  design/VISUAL_DESIGN_SPEC.md
  design/ENDPOINT_PORT_MODEL.md
  guides/CHANGELOG_TEMPLATE.md
  guides/COMPATIBILITY_CHECKLIST.md
  guides/OAUTH_ENDPOINTS.md
  guides/RELEASE_RUNBOOK.md
  guides/ROLLBACK_RUNBOOK.md
  guides/WEB_VITALS_GATES.md
  model/STORAGE_ARCHITECTURE.md
  concept/ROADMAP_0X_HISTORY.md
  user-guide/generate-code.md
  user-guide/create-architecture.md

nav:
  - Home: README.md

  - Start Here:
      - What is CloudBlocks?: user-guide/index.md
      - Quick Start: user-guide/quick-start.md
      - First Architecture from a Template: user-guide/first-architecture.md
      - Core Concepts: user-guide/core-concepts.md

  - Build:
      - Templates: user-guide/templates.md
      - Editor Basics: user-guide/editor-basics.md
      - Validation: user-guide/validation.md
      - Workspaces & Save/Load: user-guide/workspaces.md
      - Keyboard Shortcuts: user-guide/keyboard-shortcuts.md
      - FAQ: user-guide/faq.md

  - Advanced:
      - Blank Canvas Mode: advanced/blank-canvas.md
      - Code Generation (Experimental): advanced/code-generation.md
      - Backend Integrations: advanced/backend-integrations.md

  - Reference:
      - Architecture Model: model/DOMAIN_MODEL.md
      - Compatibility & Migration: concept/COMPATIBILITY.md
      - CloudBlocks Spec v2.0: design/CLOUDBLOCKS_SPEC_V2.md
      - Learning Mode: design/LEARNING_MODE_SPEC.md
      - V1 Product Contract: concept/V1_PRODUCT_CONTRACT.md

  - Contributors:
      - contributing.md
      - Setup: guides/TUTORIALS.md
      - Environment & Workspaces: guides/ENVIRONMENT_STRATEGY.md
      - Deployment: guides/DEPLOYMENT.md
      - Generator Architecture: engine/generator.md
      - Provider Adapters: engine/provider.md
      - Template Engine: engine/templates.md
      - Validation Rules Engine: engine/rules.md
      - AI Engine: engine/ai.md
      - Validation Contract: design/VALIDATION_CONTRACT.md
      - Theme System: design/THEME_SYSTEM_SPEC.md
      - REST API: api/API_SPEC.md
      - Editor Internals: concept/UI_FLOW.md

site_name: CloudBlocks Documentation
site_description: Visual cloud architecture builder — design infrastructure visually, compile to Terraform, Bicep & Pulumi
site_url: https://yeongseon.github.io/cloudblocks/docs/
repo_url: https://github.com/yeongseon/cloudblocks
repo_name: yeongseon/cloudblocks
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

validation:
  links:
    not_found: info

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - header.autohide
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

extra_css:
  - stylesheets/professional-theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

exclude_docs: |
  adr/
  concept/ARCHITECTURE.md
  concept/PRD.md
  concept/PRODUCT_DIRECTION_SPEC.md
  concept/RESOURCE_CATEGORY_STRATEGY.md
  concept/ROADMAP.md
  design/BRICK_CONNECTOR_SPEC.md
  design/BRICK_DESIGN_SPEC.md
  design/BRICK_GUIDEBOOK.md
  design/GRAPH_IR_SPEC.md
  design/KPI_SCORECARD.md
  design/MODULE_BOUNDARIES.md
  design/NFR_TARGETS.md
  design/PROVIDER_RESOURCES.md
  design/RELEASE_GATES.md
  design/SECURITY_BOUNDARIES.md
  design/VERSION_POLICY.md
  design/VISUAL_DESIGN_SPEC.md
  guides/AZURE_PROVISIONING_RUNBOOK.md
  guides/CHANGELOG_TEMPLATE.md
  guides/COMPATIBILITY_CHECKLIST.md
  guides/LAUNCH_PACKET.md
  guides/OAUTH_ENDPOINTS.md
  guides/PLAUSIBLE_SETUP.md
  guides/RELEASE_RUNBOOK.md
  guides/ROLLBACK_RUNBOOK.md
  guides/WEB_VITALS_GATES.md
  model/STORAGE_ARCHITECTURE.md

nav:
  - Home: README.md

  - User Guide:
      - user-guide/index.md
      - Quick Start: user-guide/quick-start.md
      - Core Concepts: user-guide/core-concepts.md
      - Create an Architecture: user-guide/create-architecture.md
      - Generate Code: user-guide/generate-code.md
      - Use Templates: user-guide/templates.md
      - Keyboard Shortcuts: user-guide/keyboard-shortcuts.md
      - FAQ: user-guide/faq.md

  - Setup:
      - Tutorials: guides/TUTORIALS.md
      - Environment & Workspaces: guides/ENVIRONMENT_STRATEGY.md
      - Deployment: guides/DEPLOYMENT.md

  - Features:
      - Using the Editor: concept/UI_FLOW.md
      - Templates: engine/templates.md
      - Validation Rules: engine/rules.md
      - Code Generator: engine/generator.md
      - AI Engine: engine/ai.md
      - Provider Adapters: engine/provider.md
      - Learning Mode: design/LEARNING_MODE_SPEC.md

  - Reference:
      - CloudBlocks Spec v2.0: design/CLOUDBLOCKS_SPEC_V2.md
      - Domain Model: model/DOMAIN_MODEL.md
      - Theme System: design/THEME_SYSTEM_SPEC.md
      - Validation Contract: design/VALIDATION_CONTRACT.md
      - REST API: api/API_SPEC.md

  - Contributing: contributing.md

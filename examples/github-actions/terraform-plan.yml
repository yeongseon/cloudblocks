name: CloudBlocks Terraform Plan

on:
  pull_request:
    paths:
      - 'cloudblocks/architecture.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_FILE: ${{ vars.TF_VAR_FILE || 'terraform.tfvars' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color > plan.txt 2>&1 || echo "plan_failed=true" >> $GITHUB_OUTPUT
          cat plan.txt
        working-directory: ./infra
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('./infra/plan.txt', 'utf8');
            const planFailed = '${{ steps.plan.outputs.plan_failed }}' === 'true';

            let comment = '<details>\n';
            comment += '<summary>Terraform Plan Output</summary>\n\n';
            comment += '```hcl\n';
            comment += planOutput;
            comment += '\n```\n';
            comment += '</details>\n';

            if (planFailed) {
              comment = '❌ Terraform plan failed\n\n' + comment;
            } else {
              comment = '✓ Terraform plan succeeded\n\n' + comment;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

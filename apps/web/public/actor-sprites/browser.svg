<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 140">
  <defs>
    <linearGradient id="browser-frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B7FA0" />
      <stop offset="55%" stop-color="#355B78" />
      <stop offset="100%" stop-color="#1E3A50" />
    </linearGradient>
    <linearGradient id="browser-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FD1F4" />
      <stop offset="55%" stop-color="#4FA2D4" />
      <stop offset="100%" stop-color="#2C6F99" />
    </linearGradient>
    <linearGradient id="browser-highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="browser-stand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D91AF" />
      <stop offset="100%" stop-color="#2B4E68" />
    </linearGradient>
  </defs>

  <!-- Base shadow ellipse -->
  <ellipse cx="79" cy="120" rx="56" ry="16" fill="rgba(0,0,0,0.2)" />

  <!-- Monitor frame -->
  <rect x="28" y="20" width="102" height="72" rx="8" fill="url(#browser-frame)" />

  <!-- Browser window chrome -->
  <rect x="36" y="28" width="86" height="10" rx="4" fill="#2A4A63" opacity="0.9" />
  <circle cx="43" cy="33" r="1.9" fill="#9EC8E4" />
  <circle cx="49" cy="33" r="1.9" fill="#7DB3D7" />
  <circle cx="55" cy="33" r="1.9" fill="#5C9FCB" />
  <rect x="62" y="30.5" width="54" height="5" rx="2.5" fill="#7DB3D7" opacity="0.45" />

  <!-- Screen area -->
  <rect x="36" y="40" width="86" height="44" rx="5" fill="url(#browser-screen)" />
  <path d="M44 72L59 58L70 66L84 52L102 70L114 60V84H44Z" fill="#C3EBFF" opacity="0.3" />
  <rect x="44" y="46" width="34" height="4" rx="2" fill="#C3EBFF" opacity="0.45" />
  <rect x="44" y="53" width="48" height="3.5" rx="1.75" fill="#C3EBFF" opacity="0.3" />
  <rect x="44" y="59.5" width="26" height="3.5" rx="1.75" fill="#C3EBFF" opacity="0.28" />

  <!-- Glossy highlight -->
  <path d="M38 42C42 35 51 30 64 30H95C80 40 62 56 52 84H38Z" fill="url(#browser-highlight)" />

  <!-- Stand and base -->
  <rect x="72" y="92" width="14" height="13" rx="3" fill="url(#browser-stand)" />
  <ellipse cx="79" cy="107" rx="30" ry="8" fill="url(#browser-stand)" />
  <ellipse cx="79" cy="107" rx="22" ry="5.4" fill="#83AECF" opacity="0.6" />
</svg>

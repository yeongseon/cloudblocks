<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!--
    CloudBlocks Logo
    Concept: Three overlapping rounded squares arranged in a cloud-like cluster,
    representing "blocks" that compose into "cloud" architectures.
    Clean silhouette — no small details, reads well from 16px to 128px.
    Colors: Blue triad from the app's accent palette (#2563eb).
  -->

  <!-- Bottom-left block -->
  <rect x="3" y="25" width="20" height="20" rx="4" fill="#3b82f6"/>

  <!-- Bottom-right block -->
  <rect x="25" y="25" width="20" height="20" rx="4" fill="#2563eb"/>

  <!-- Top-center block (cloud peak) -->
  <rect x="14" y="3" width="20" height="20" rx="4" fill="#1d4ed8"/>
</svg>
